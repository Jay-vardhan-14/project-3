name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # NOTE: ml-tests and serving-tests are deliberately separate jobs, not habit.
  # apache-airflow (orchestration extra) pins sqlalchemy>=1.4.36,<2.0 while the
  # serving API needs sqlalchemy[asyncio]>=2.0.30 — non-overlapping ranges that
  # cannot coexist in one environment (declared as conflicting extras in
  # pyproject.toml). This mirrors production: the Airflow and serving containers
  # run different SQLAlchemy majors.
  ml-tests:
    name: ml-tests (training + orchestration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Sync deps
        run: uv sync --extra training --extra orchestration
      - name: Run ml tests
        run: uv run --no-sync pytest tests -q

  serving-tests:
    name: serving-tests (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Sync deps
        run: uv sync --extra serving
      - name: Run serving tests
        run: uv run --no-sync pytest serving/tests -q

  dashboard-build:
    name: dashboard-build (Vite + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build

  docker-build:
    name: docker-build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate full compose config
        run: docker compose -f docker-compose.yml config --quiet
      - name: Build serving image
        run: docker build -f serving/Dockerfile -t sentinelml-serving:ci .
      - name: Build dashboard image
        run: docker build -f dashboard/Dockerfile -t sentinelml-dashboard:ci ./dashboard

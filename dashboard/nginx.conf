server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the serving container on the compose network.
    location /api/ {
        proxy_pass http://serving:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
